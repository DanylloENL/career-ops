# -- Tracked companies --
# Companies whose career pages are checked directly.
# scan_method: playwright (default), websearch, greenhouse_api
# For Greenhouse companies, add api: field for faster structured JSON access.
#
# LOCATION RESTRICTIONS:
#
# **Remote Positions (Brazil):** All considered (100% remote)
#
# **Brazil On-site/Hybrid:** Only DF-based (Distrito Federal)
#
# **International Strategy:**
#   Visa Sponsorship NOT Required (recommended for Jr level):
#   - Contractor roles ("Contractor", "1099", "C2C")
#   - B2B/PJ arrangements (independent contractor)
#   - "Remote Brazil" or "Remote Latin America" positions
#   - Digital nomad visa-friendly countries (Portugal, Spain, Mexico)
#
#   Visa Sponsorship POSSIBLE (research-driven):
#   - Portugal: Visto Tech / Visto de Residência (tech companies actively sponsor)
#   - Germany: Opportunity Card (Chancenkarte) / Blue Card (tech shortage)
#   - Canada: Global Talent Stream (accelerated visa for IT roles)
#   - Search terms: "visa sponsorship", "relocation package", "visa support"
#
# **Key International Portals for Non-Visa Roles:**
#   - Relocate.me: Relocation + visa packages (pre-filtered)
#   - VanHack: Strong for Canada/Europe, Brazilian-focused
#   - Landing.jobs: Europe specialist (Portugal, Germany)
#   - FashionJobs.com: Retail/luxury sector globally
#   - Inditex Careers: Zara, Massimo Dutti, Pull & Bear (global)
#   - Michael Page / Robert Half: Executive recruitment (tech & data)
#   - Cia de Talentos / Eureca: Brazil trainee & entry programs

